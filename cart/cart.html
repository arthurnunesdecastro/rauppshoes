<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho · Raupp Shoes</title>
    <link rel="icon" type="image/x-icon" href="../img/raupp_shoes_logo_transparent.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="cart.css"> 
</head>
<body>
    <header>
        <div class="container header-container">
            <div class="search-container">
                <form id="search-form">
                    <input type="text" placeholder="Pesquisar..." id="search-input">
                    <button type="submit"><i class="fas fa-search"></i></button>
                </form>
            </div>
            
            <!-- Logo -->
            <a href="../index.html" class="logo">
                <img src="../img/raupp_shoes_logo_transparent.png" alt="Raupp Shoes">
            </a>
            
            <!-- Icons -->
            <div class="header-icons">
                <!-- Mobile search toggle -->
                <button class="mobile-search-toggle" aria-label="Search">
                    <i class="fas fa-search"></i>
                </button>
                <a href="../login/login.html" class="profile-icon">
                    <i class="fas fa-user"></i>
                </a>
                <a href="../cart/cart.html" class="cart-icon">
                    <i class="fas fa-shopping-bag"></i>
                    <span class="cart-count">0</span>
                </a>
            </div>
        </div>
    </header>
    <main class="cart-page">
        <div class="container">
            <h2 class="section-title">SEU CARRINHO</h2>
            <div class="cart-container">
                <div class="cart-items-container">
                    <div class="cart-items">
                        <!-- Cart items will be added dynamically -->
                    </div>
                    <div class="empty-cart">
                        <i class="fas fa-shopping-bag"></i>
                        <h2>Seu carrinho está vazio</h2>
                        <p>Parece que você não adicionou nada no seu carrinho ainda</p>
                        <button class="continue-shopping">Continuar a comprar</button>
                    </div>
                </div>
                <div class="cart-summary">
                    <h2>RESUMO DO PEDIDO</h2>
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span class="subtotal">R$0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Frete</span>
                        <span>Grátis</span>
                    </div>
                    <div class="summary-row summary-total">
                        <span>Total</span>
                        <span class="total">R$0.00</span>
                    </div>
                    <button class="checkout-btn">Continuar</button>
                </div>
            </div>
        </div>
    </main>
    
    <footer>
        <div class="container">
            <div class="footer-content">
                <a href="../index.html" class="logo">
                    <img src="../img/raupp_shoes_logo_transparent.png" alt="">
                </a>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 Raupp Shoes. All rights reserved.</p>
            </div>
        </div>
      </footer>
    
    <script src="../js/cart.js"></script>
</body>
</html>
